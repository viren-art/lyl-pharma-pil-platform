steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/pil-creation-and-artwork-management-platform', '.']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/pil-creation-and-artwork-management-platform']
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'pil-creation-and-artwork-management-platform'
      - '--image'
      - 'gcr.io/$PROJECT_ID/pil-creation-and-artwork-management-platform'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
images:
  - 'gcr.io/$PROJECT_ID/pil-creation-and-artwork-management-platform'
